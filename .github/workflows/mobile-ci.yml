name: Mobile CI

on:
  push:
    branches: [react-native, main]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [react-native]
    paths:
      - 'mobile/**'

jobs:
  check:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm install --legacy-peer-deps

      - name: TypeScript check
        run: cd mobile && npx tsc --noEmit

      - name: Run tests
        run: cd mobile && npx vitest run --passWithNoTests

  eas-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/react-native'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd mobile && npm install --legacy-peer-deps

      - name: Build preview
        run: cd mobile && eas build --platform ios --profile preview --non-interactive
        continue-on-error: true
