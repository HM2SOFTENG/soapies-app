name: Deploy to DigitalOcean Production

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'drizzle.config.ts'
      - 'migrations/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/server-ci.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: soapies-app

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ secrets.DO_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.DO_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.DO_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.DO_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --wait

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:push --force

  cleanup:
    name: Clean Old Images
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Delete old image manifests (keep latest 3)
        run: |
          set +e
          REPO="${{ env.IMAGE_NAME }}"
          ALL_TAGS=$(doctl registry repository list-tags "$REPO" --format Tag,UpdatedAt --no-header 2>/dev/null)
          if [ -z "$ALL_TAGS" ]; then
            echo "No tags found in repository."
            exit 0
          fi
          TAGS=$(echo "$ALL_TAGS" | grep -v "^latest" | sort -k2 | head -n -3 | awk '{print $1}' || true)
          if [ -z "$TAGS" ]; then
            echo "No old tags to clean up."
          else
            for TAG in $TAGS; do
              echo "Deleting $REPO:$TAG ..."
              doctl registry repository delete-tag "$REPO" --tag "$TAG" --force || true
            done
          fi

      # NOTE: Do NOT trigger garbage collection here — it locks the registry for writes
      # (sometimes 20-30+ minutes) which causes all subsequent pushes to fail with "unauthorized".
      # DigitalOcean runs GC automatically. Trigger manually from the DO dashboard if needed.
